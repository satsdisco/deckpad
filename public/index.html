<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeckPad — HTML Presentation Gallery</title>
<style>/* ─── DeckPad Design System v2 ────────────────────────────────────────────── */
/* Deep space + instrumentation · Institutional fintech · Minimal            */

@import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800&f[]=satoshi@400,500,700&display=swap');

:root {
  /* Core palette */
  --void: #0A0F17;
  --rail: #121B2A;
  --slate: #223047;
  --silver: #D9E1EA;
  --cyan: #3CCBDA;
  --cyan-dim: rgba(60,203,218,.12);
  --cyan-mid: rgba(60,203,218,.25);
  --btc-gold: #F2B134;
  --btc-gold-dim: rgba(242,177,52,.10);

  /* Semantic */
  --bg: var(--void);
  --surface: var(--rail);
  --surface2: var(--slate);
  --border: rgba(255,255,255,.06);
  --border2: rgba(255,255,255,.10);
  --text: var(--silver);
  --muted: #8A95A7;
  --muted2: #556178;
  --accent: var(--cyan);
  --accent-dim: var(--cyan-dim);
  --danger: #E5484D;
  --success: #30A46C;

  /* Layout */
  --radius: 10px;
  --radius-lg: 14px;
  --header-h: 60px;

  /* Typography */
  --font-display: 'Cabinet Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-body: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 16px;
  line-height: 1.6;
}

a { color: var(--accent); text-decoration: none; transition: color .15s; }
a:hover { color: #5FE3F0; }

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
}

/* ─── Layout ─────────────────────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  height: var(--header-h);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,15,23,.88);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
}

.header-left { display: flex; align-items: center; gap: 32px; }

.logo {
  font-family: var(--font-display);
  font-size: 1.3em; font-weight: 800; color: var(--text);
  letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;
}
.logo .mark { color: var(--accent); }

/* Tab Navigation */
.nav-tabs { display: flex; gap: 4px; height: var(--header-h); align-items: stretch; }
.nav-tab {
  display: flex; align-items: center; padding: 0 16px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  color: var(--muted); text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  position: relative;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.header-actions { display: flex; gap: 10px; align-items: center; }

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: 8px; font-size: 13px;
  font-family: var(--font-body); font-weight: 600;
  cursor: pointer; border: none;
  transition: all .15s ease;
  text-decoration: none;
}
.btn-primary {
  background: var(--accent); color: var(--void);
}
.btn-primary:hover { background: #5FE3F0; transform: translateY(-1px); color: var(--void); }
.btn-ghost {
  background: transparent; color: var(--muted); border: 1px solid var(--border2);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--text); }
.btn-danger {
  background: transparent; color: var(--danger); border: 1px solid rgba(229,72,77,.25);
}
.btn-danger:hover { background: rgba(229,72,77,.1); border-color: var(--danger); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: .35; cursor: default; pointer-events: none; }

/* ─── Search & Filters ───────────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  padding: 24px 0 16px;
}

.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 16px 10px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 14px;
  font-family: var(--font-body); outline: none; transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--muted2); }
.search-box::before {
  content: '⌕'; position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); font-size: 16px; color: var(--muted2); pointer-events: none;
}

.sort-select {
  padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 14px;
  font-family: var(--font-body); cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--accent); }
.sort-select option { background: var(--surface); }

/* ─── Tags ───────────────────────────────────────────────────────────────── */
.tag-bar { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 8px; }
.tag-chip {
  padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
  user-select: none; font-family: var(--font-body);
}
.tag-chip:hover { border-color: var(--accent); color: var(--text); }
.tag-chip.active {
  background: var(--cyan-dim); border-color: rgba(60,203,218,.3);
  color: var(--accent);
}

/* ─── Gallery Grid ───────────────────────────────────────────────────────── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px; padding: 8px 0 48px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer;
  transition: transform .2s ease, border-color .2s, box-shadow .2s;
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--border2);
  box-shadow: 0 12px 40px rgba(0,0,0,.4);
}
.card-thumb {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  background: var(--slate); display: block;
}
.card-thumb-placeholder {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, var(--rail), var(--void));
}
.card-body { padding: 16px; }
.card-title {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  font-size: 12px; color: var(--muted); display: flex;
  align-items: center; gap: 12px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.card-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: var(--cyan-dim); color: var(--accent);
  border: 1px solid rgba(60,203,218,.12);
  font-weight: 500;
}

/* ─── Empty State ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 20px; grid-column: 1 / -1;
}
.empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: .5; }
.empty-state h3 {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700; margin-bottom: 8px;
}
.empty-state p { color: var(--muted); margin-bottom: 24px; font-size: 15px; }

/* ─── Pagination ─────────────────────────────────────────────────────────── */
.pagination { display: flex; justify-content: center; gap: 6px; padding: 0 0 48px; }
.page-btn {
  padding: 7px 13px; border-radius: 8px; font-size: 13px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
  font-family: var(--font-body);
}
.page-btn:hover { border-color: var(--accent); color: var(--text); }
.page-btn.active { background: var(--accent); color: var(--void); border-color: var(--accent); font-weight: 700; }
.page-btn:disabled { opacity: .25; cursor: default; }

/* ─── Upload Page ────────────────────────────────────────────────────────── */
.upload-page { max-width: 600px; margin: 0 auto; padding: 48px 24px 80px; }
.upload-page h1 {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800; margin-bottom: 6px;
}
.upload-page .subtitle { color: var(--muted); margin-bottom: 32px; font-size: 15px; }

.drop-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 56px 24px; text-align: center;
  transition: border-color .2s, background .2s; cursor: pointer;
  margin-bottom: 28px;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent); background: var(--cyan-dim);
}
.drop-zone .icon { font-size: 40px; margin-bottom: 12px; opacity: .6; }
.drop-zone .label { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.drop-zone .hint { font-size: 13px; color: var(--muted); }
.drop-zone .file-name {
  margin-top: 12px; font-size: 14px; color: var(--accent);
  font-weight: 600; display: none;
}

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--muted); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: .04em;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 11px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 14px;
  outline: none; font-family: var(--font-body); transition: border-color .2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }

.upload-progress { display: none; margin-top: 20px; text-align: center; }
.progress-bar-bg {
  width: 100%; height: 4px; background: var(--surface);
  border-radius: 2px; overflow: hidden; margin-bottom: 8px;
}
.progress-bar-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width .3s ease;
}
.progress-text { font-size: 13px; color: var(--muted); }

/* ─── Deck Viewer ────────────────────────────────────────────────────────── */
.viewer-page { padding-bottom: 48px; }
.viewer-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 20px 0; font-size: 14px; color: var(--muted);
}
.viewer-back:hover { color: var(--accent); }

.viewer-frame-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  border-radius: var(--radius-lg); overflow: hidden;
  border: 1px solid var(--border); background: #000;
}
.viewer-frame { width: 100%; height: 100%; border: none; }
.viewer-fullscreen {
  position: absolute; top: 12px; right: 12px;
  background: rgba(10,15,23,.8); border: 1px solid var(--border2);
  color: var(--text); padding: 7px 14px; border-radius: 8px;
  font-size: 13px; cursor: pointer; opacity: 0;
  transition: opacity .2s; backdrop-filter: blur(8px);
  font-family: var(--font-body);
}
.viewer-frame-wrap:hover .viewer-fullscreen { opacity: 1; }
.viewer-fullscreen:hover { background: var(--cyan-dim); border-color: var(--accent); }

.viewer-info { padding: 24px 0; }
.viewer-title {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 800; margin-bottom: 8px;
}
.viewer-meta { font-size: 14px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.viewer-desc { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
.viewer-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.viewer-tag {
  padding: 4px 12px; border-radius: 6px; font-size: 12px;
  background: var(--cyan-dim); color: var(--accent);
  border: 1px solid rgba(60,203,218,.12); font-weight: 500;
}
.viewer-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.embed-box {
  margin-top: 20px; padding: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); display: none;
}
.embed-box label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.embed-box code {
  display: block; padding: 10px; background: var(--void);
  border-radius: 6px; font-size: 12px; color: var(--accent);
  word-break: break-all; font-family: 'SF Mono', Monaco, 'Fira Code', monospace;
}

/* ─── Build in Public Page ───────────────────────────────────────────────── */
.build-page { padding: 32px 0 64px; }
.build-page .page-title {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 800; margin-bottom: 4px;
}
.build-page .page-subtitle { color: var(--muted); margin-bottom: 40px; font-size: 15px; }

.section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
}
.section-count {
  font-size: 12px; color: var(--muted); font-weight: 500;
  background: var(--surface); padding: 3px 10px; border-radius: 100px;
}

.section-block { margin-bottom: 48px; }

/* Bounty cards */
.bounty-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.bounty-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  transition: border-color .15s;
}
.bounty-card:hover { border-color: var(--border2); }
.bounty-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.bounty-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; flex: 1; }
.bounty-sats {
  font-family: var(--font-body); font-size: 14px; font-weight: 700;
  color: var(--btc-gold); white-space: nowrap; margin-left: 12px;
}
.bounty-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.bounty-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.bounty-status {
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 100px; text-transform: uppercase; letter-spacing: .04em;
}
.bounty-status.open { background: var(--cyan-dim); color: var(--accent); }
.bounty-status.claimed { background: var(--btc-gold-dim); color: var(--btc-gold); }
.bounty-status.completed { background: rgba(48,164,108,.12); color: var(--success); }
.bounty-deadline { font-size: 11px; color: var(--muted2); }

/* Event cards */
.event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
.event-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px;
  display: flex; gap: 20px; transition: border-color .15s;
}
.event-card:hover { border-color: var(--border2); }
.event-date-badge {
  flex-shrink: 0; width: 56px; height: 56px;
  background: var(--cyan-dim); border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid rgba(60,203,218,.15);
}
.event-date-badge .day { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--accent); line-height: 1; }
.event-date-badge .month { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; }
.event-info { flex: 1; min-width: 0; }
.event-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.event-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: flex; gap: 12px; }
.event-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.event-countdown {
  font-size: 12px; font-weight: 600; color: var(--accent);
  font-family: var(--font-body);
}
.event-type {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: .04em;
  background: var(--cyan-dim); color: var(--accent);
  display: inline-block; margin-bottom: 8px;
}

/* Speaker lineup */
.speaker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.speaker-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  display: flex; justify-content: space-between; align-items: flex-start;
  transition: border-color .15s;
}
.speaker-card:hover { border-color: var(--border2); }
.speaker-info { flex: 1; min-width: 0; }
.speaker-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.speaker-project { font-size: 13px; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
.speaker-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
.speaker-duration { font-size: 11px; color: var(--muted2); margin-top: 4px; }

.vote-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  background: var(--void); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px; font-weight: 600;
  transition: all .15s; min-width: 48px;
  font-family: var(--font-body);
}
.vote-btn:hover { border-color: var(--accent); color: var(--accent); }
.vote-btn.voted { background: var(--cyan-dim); border-color: rgba(60,203,218,.3); color: var(--accent); }
.vote-btn .arrow { font-size: 14px; line-height: 1; }

/* Project showcase */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.project-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  transition: border-color .15s;
}
.project-card:hover { border-color: var(--border2); }
.project-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.project-builder { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.project-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.project-footer { display: flex; align-items: center; justify-content: space-between; }
.project-status {
  font-size: 10px; font-weight: 600; padding: 3px 10px;
  border-radius: 100px; text-transform: uppercase; letter-spacing: .04em;
}
.project-status.idea { background: var(--btc-gold-dim); color: var(--btc-gold); }
.project-status.building { background: var(--cyan-dim); color: var(--accent); }
.project-status.shipped { background: rgba(48,164,108,.12); color: var(--success); }
.project-links { display: flex; gap: 8px; }
.project-links a {
  font-size: 12px; color: var(--muted); padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  transition: all .15s;
}
.project-links a:hover { border-color: var(--accent); color: var(--accent); }

/* ─── Vote Page ──────────────────────────────────────────────────────────── */
.vote-page { padding: 32px 0 64px; }
.vote-page .page-title {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 800; margin-bottom: 4px;
}
.vote-page .page-subtitle { color: var(--muted); margin-bottom: 40px; font-size: 15px; }

.leaderboard { display: flex; flex-direction: column; gap: 10px; }
.leaderboard-item {
  display: flex; align-items: center; gap: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  transition: border-color .15s;
}
.leaderboard-item:hover { border-color: var(--border2); }
.leaderboard-rank {
  font-family: var(--font-display); font-size: 18px; font-weight: 800;
  width: 32px; text-align: center; color: var(--muted2);
}
.leaderboard-item:nth-child(1) .leaderboard-rank { color: var(--btc-gold); }
.leaderboard-item:nth-child(2) .leaderboard-rank { color: var(--silver); }
.leaderboard-item:nth-child(3) .leaderboard-rank { color: #CD7F32; }
.leaderboard-info { flex: 1; min-width: 0; }
.leaderboard-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; }
.leaderboard-project { font-size: 13px; color: var(--accent); }
.leaderboard-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ─── Admin Page ─────────────────────────────────────────────────────────── */
.admin-page { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
.admin-page h1 {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800; margin-bottom: 4px;
}
.admin-page .subtitle { color: var(--muted); margin-bottom: 32px; font-size: 15px; }
.admin-section { margin-bottom: 40px; }
.admin-section h2 {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

.admin-table {
  width: 100%; border-collapse: collapse; margin-top: 16px;
}
.admin-table th {
  text-align: left; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}
.admin-table td {
  padding: 10px 12px; font-size: 13px; color: var(--text);
  border-bottom: 1px solid var(--border);
}

/* Inline form in sections */
.inline-form {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px;
  margin-bottom: 20px;
}
.inline-form h3 {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700; margin-bottom: 16px;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row.full { grid-template-columns: 1fr; }

/* RSVP form */
.rsvp-form {
  display: flex; gap: 8px; align-items: flex-end;
}
.rsvp-form input {
  flex: 1; padding: 8px 12px;
  background: var(--void); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: var(--font-body); outline: none;
}
.rsvp-form input:focus { border-color: var(--accent); }

/* Flash messages */
.flash {
  padding: 10px 16px; border-radius: 8px; font-size: 13px;
  margin-bottom: 16px; display: none;
}
.flash.success { background: rgba(48,164,108,.12); color: var(--success); border: 1px solid rgba(48,164,108,.2); display: block; }
.flash.error { background: rgba(229,72,77,.12); color: var(--danger); border: 1px solid rgba(229,72,77,.2); display: block; }

/* ─── Footer ─────────────────────────────────────────────────────────────── */
.footer {
  text-align: center; padding: 32px; font-size: 12px;
  color: var(--muted2); border-top: 1px solid var(--border);
  font-family: var(--font-body);
}

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .header { padding: 0 16px; flex-wrap: wrap; height: auto; min-height: var(--header-h); }
  .header-left { width: 100%; justify-content: space-between; padding: 12px 0 0; }
  .nav-tabs { width: 100%; overflow-x: auto; padding-bottom: 0; }
  .nav-tab { padding: 12px 14px; font-size: 13px; white-space: nowrap; }
  .header-actions { position: absolute; top: 14px; right: 16px; }
  .logo { font-size: 1.15em; }
  .gallery { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; }
  .upload-page h1, .build-page .page-title, .vote-page .page-title { font-size: 24px; }
  .viewer-title { font-size: 22px; }
  .viewer-frame-wrap { aspect-ratio: 4/3; }
  .bounty-grid, .event-grid, .project-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .event-card { flex-direction: column; gap: 12px; }
  .rsvp-form { flex-direction: column; }
}

@media (max-width: 400px) {
  .container { padding: 0 16px; }
  .speaker-grid { grid-template-columns: 1fr; }
}
.user-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px 4px 4px; border-radius: 100px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 13px; color: var(--text); cursor: pointer;
  transition: border-color .15s;
}
.user-pill:hover { border-color: var(--accent); }
.user-pill img {
  width: 26px; height: 26px; border-radius: 50%;
  object-fit: cover;
}
.user-menu {
  position: relative; display: inline-block;
}
.user-dropdown {
  display: none; position: absolute; right: 0; top: 100%; margin-top: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px; min-width: 160px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 200;
}
.user-dropdown.open { display: block; }
.user-dropdown a {
  display: block; padding: 8px 12px; border-radius: 6px;
  font-size: 13px; color: var(--text); text-decoration: none;
}
.user-dropdown a:hover { background: var(--void); color: var(--accent); }
.sign-in-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 13px;
  font-weight: 500; color: var(--text); background: var(--surface);
  border: 1px solid var(--border); cursor: pointer;
  text-decoration: none; transition: all .15s;
  font-family: var(--font-body);
}
.sign-in-btn:hover { border-color: var(--accent); color: var(--accent); }
.sign-in-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo"><span class="mark">◆</span> DeckPad</a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    <a href="/vote" class="nav-tab">Vote</a>
  </nav>
  <div class="header-actions" id="authArea">
    <a href="/upload" class="btn btn-primary">⬆ Upload Deck</a>
    <div id="userArea"></div>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search presentations...">
    </div>
    <select class="sort-select" id="sort">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="views">Most viewed</option>
      <option value="votes">Top voted</option>
    </select>
  </div>

  <div class="tag-bar" id="tagBar"></div>
  <div class="gallery" id="gallery"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer class="footer">DeckPad — Your stage for HTML presentations</footer>

<script>
  let currentPage = 1;
  let currentSearch = '';
  let currentSort = 'newest';
  let activeTags = new Set();

  // Load tags
  async function loadTags() {
    const res = await fetch('/api/tags');
    const tags = await res.json();
    const bar = document.getElementById('tagBar');
    bar.innerHTML = '';
    tags.forEach(tag => {
      const chip = document.createElement('div');
      chip.className = 'tag-chip';
      chip.textContent = tag;
      chip.addEventListener('click', () => {
        if (activeTags.has(tag)) { activeTags.delete(tag); chip.classList.remove('active'); }
        else { activeTags.add(tag); chip.classList.add('active'); }
        currentPage = 1;
        loadDecks();
      });
      bar.appendChild(chip);
    });
  }

  // Load decks
  async function loadDecks() {
    const params = new URLSearchParams({
      page: currentPage,
      limit: 12,
      sort: currentSort,
    });
    if (currentSearch) params.set('search', currentSearch);
    if (activeTags.size) params.set('tags', [...activeTags].join(','));

    const res = await fetch('/api/decks?' + params);
    const data = await res.json();
    renderGallery(data.decks);
    renderPagination(data.pagination);
  }

  function renderGallery(decks) {
    const el = document.getElementById('gallery');
    if (!decks.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="icon">🎭</div>
          <h3>No presentations yet</h3>
          <p>Be the first to upload an HTML presentation</p>
          <a href="/upload" class="btn btn-primary">Upload Your Deck</a>
        </div>`;
      return;
    }

    el.innerHTML = decks.map(d => {
      const thumb = d.thumbnail
        ? `<img class="card-thumb" src="/thumbnails/${d.thumbnail}" alt="${esc(d.title)}" loading="lazy">`
        : `<div class="card-thumb-placeholder">🎭</div>`;

      const tags = d.tags ? d.tags.split(',').map(t => t.trim()).filter(Boolean)
        .slice(0, 3).map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '';

      const date = new Date(d.created_at).toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
      const votes = d.votes || 0;

      return `
        <div class="card" onclick="location.href='/deck/${d.id}'">
          ${thumb}
          <div class="card-body">
            <div class="card-title">${esc(d.title)}</div>
            <div class="card-meta">
              <span>${esc(d.author)}</span>
              <span>${date}</span>
              <span>${d.views} view${d.views !== 1 ? 's' : ''}</span>
              <span>🔺 ${votes}</span>
            </div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function renderPagination(p) {
    const el = document.getElementById('pagination');
    if (p.pages <= 1) { el.innerHTML = ''; return; }

    let html = '';
    html += `<button class="page-btn" ${p.page <= 1 ? 'disabled' : ''} onclick="goPage(${p.page - 1})">‹</button>`;
    for (let i = 1; i <= p.pages; i++) {
      html += `<button class="page-btn${i === p.page ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" ${p.page >= p.pages ? 'disabled' : ''} onclick="goPage(${p.page + 1})">›</button>`;
    el.innerHTML = html;
  }

  function goPage(n) { currentPage = n; loadDecks(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // Events
  let searchTimeout;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentSearch = e.target.value;
      currentPage = 1;
      loadDecks();
    }, 250);
  });

  document.getElementById('sort').addEventListener('change', e => {
    currentSort = e.target.value;
    currentPage = 1;
    loadDecks();
  });

  // Init
  loadTags();
  loadDecks();
</script>
<script>
// Auth
async function initAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    const area = document.getElementById('userArea');
    if (!area) return;
    if (data.user) {
      area.innerHTML = `
        <div class="user-menu">
          <div class="user-pill" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
            <img src="${data.user.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span>${data.user.name || data.user.email}</span>
          </div>
          <div class="user-dropdown">
            <a href="/auth/logout">Sign out</a>
          </div>
        </div>`;
      document.addEventListener('click', e => {
        if (!e.target.closest('.user-menu')) {
          document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('open'));
        }
      });
    } else {
      area.innerHTML = '<a href="/auth/google" class="sign-in-btn">Sign in with Google</a>';
    }
  } catch(e) { console.warn('Auth check failed'); }
}
initAuth();
</script>
</body>
</html>
